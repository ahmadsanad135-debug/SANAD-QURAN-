<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصحف سند - الفهرس</title>
    <link rel="manifest" href="manifest.json"> <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { 
            --primary: #1a4d2e; 
            --accent: #d4af37; 
            --bg-body: #fdfbf7; 
            --text-main: #2c3e50;
            --white: #ffffff;
            --card-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }
        
        * { box-sizing: border-box; }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--bg-body); 
            margin: 0; 
            color: var(--text-main); 
        }

        /* الهيدر */
        header { 
            background: linear-gradient(135deg, var(--primary), #0f301b); 
            color: var(--white); 
            padding: 2.5rem 1rem; 
            text-align: center; 
            border-bottom-left-radius: 30px; 
            border-bottom-right-radius: 30px;
            box-shadow: 0 4px 15px rgba(26, 77, 46, 0.3);
            position: relative;
            overflow: hidden;
        }

        h1 { font-family: 'Amiri', serif; margin: 0; font-size: 2.8rem; letter-spacing: 1px; }
        p.subtitle { opacity: 0.8; font-size: 0.9rem; margin-top: 5px; }

        /* البحث */
        .search-box { 
            position: relative; 
            max-width: 500px; 
            margin: -25px auto 20px; 
            z-index: 10;
        }
        
        #search-input { 
            width: 100%; 
            padding: 15px 50px 15px 20px; 
            border-radius: 50px; 
            border: none; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            font-family: 'Cairo', sans-serif;
            font-size: 1.1rem;
            outline: none;
        }
        
        .search-icon { 
            position: absolute; 
            right: 20px; 
            top: 50%; 
            transform: translateY(-50%); 
            color: var(--primary); 
        }

        /* زر استكمال القراءة */
        #continue-reading { 
            display: none; 
            background: #fff8e1; 
            border: 1px solid var(--accent); 
            color: #856404;
            padding: 10px 20px; 
            border-radius: 50px; 
            margin: 20px auto; 
            width: fit-content;
            font-weight: bold;
            box-shadow: 0 2px 10px rgba(212, 175, 55, 0.2);
            transition: 0.3s;
        }
        #continue-reading:hover { transform: scale(1.05); }
        #continue-reading a { text-decoration: none; color: inherit; display: flex; align-items: center; gap: 10px; }

        /* الشبكة */
        .container { max-width: 1200px; margin: 3rem auto; padding: 0 1.5rem; }

        .surah-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 1.5rem; 
        }

        .surah-card { 
            background: var(--white); 
            border-radius: 16px; 
            padding: 1.5rem; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            text-decoration: none; 
            color: var(--text-main); 
            box-shadow: var(--card-shadow); 
            transition: 0.3s ease; 
            border: 1px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .surah-card:hover { 
            transform: translateY(-5px); 
            border-color: var(--accent); 
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .card-info { flex-grow: 1; text-align: right; margin-right: 15px; }
        .surah-name { font-family: 'Amiri', serif; font-size: 1.6rem; font-weight: bold; color: var(--primary); display: block; }
        .surah-details { font-size: 0.85rem; color: #7f8c8d; margin-top: 5px; }
        
        .surah-number { 
            background: var(--bg-body); 
            color: var(--accent); 
            width: 45px; 
            height: 45px; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Amiri', serif; 
            font-weight: bold; 
            font-size: 1.2rem;
            border: 1px solid #eee;
        }

        /* زر التثبيت */
        #install-btn {
            display: none;
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            margin: 10px auto;
            cursor: pointer;
            font-family: 'Cairo';
        }
    </style>
</head>
<body>

    <header>
        <h1>مصحف سند</h1>
        <p class="subtitle">قرآن يتلى آناء الليل وأطراف النهار</p>
        <button id="install-btn"><i class="fas fa-download"></i> تثبيت التطبيق</button>
    </header>

    <div class="search-box">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="search-input" placeholder="ابحث باسم السورة أو رقمها...">
    </div>

    <div id="continue-reading">
        <a id="last-surah-link" href="#">
            <i class="fas fa-bookmark"></i>
            <span>استكمال: <span id="last-surah-name"></span></span>
        </a>
    </div>

    <div class="container">
        <div id="surah-container" class="surah-grid">
            <p style="text-align: center; width: 100%; color: #888;">جاري تحميل الفهرس...</p>
        </div>
    </div>

    <script src="surahLinks.js"></script>
</body>
</html>
