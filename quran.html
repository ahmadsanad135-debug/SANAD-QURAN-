<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مصحف سند</title>

<meta name="theme-color" content="#0f301b">

<link rel="manifest" href="manifest.json">

<link rel="icon" href="icon.png">


<link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">


<link rel="stylesheet" href="quran.css">


</head>


<body>



<header class="top-bar">


<button class="icon-button"
onclick="window.location.href='index.html'">

<i class="fas fa-arrow-right"></i>

</button>



<div class="header-center">

<div id="surah-name"
class="surah-name">

جاري التحميل...

</div>


<div id="page-number"
class="page-number">

الصفحة ١

</div>

</div>




<button id="themeButton"
class="icon-button">

<i class="fas fa-moon"></i>

</button>


</header>






<main id="reader">


<section class="mushaf-wrapper">


<div class="page-shadow">


<div id="page-header">


<span id="juz-info">
الجزء ١
</span>



<span id="hizb-info">
الحزب
</span>


</div>





<div id="quran-page-text">

</div>





<div id="page-footer">

<span id="footer-page-number">
١
</span>

</div>


</div>


</section>


</main>


<!-- نافذة التفسير -->


<div id="overlay"
class="overlay"
onclick="closeTafsir()">

</div>




<div id="tafsir-sheet"
class="bottom-sheet">


<div class="sheet-handle"></div>


<div class="sheet-header">


<h3 id="tafsir-title">
التفسير
</h3>



<button onclick="closeTafsir()"
class="close-sheet">

<i class="fas fa-times"></i>

</button>


</div>



<div id="tafsir-body"
class="sheet-body">

</div>


</div>



<!-- أزرار الصفحات -->


<div class="floating-controls">


<button class="previous-page"
onclick="Reader.previous()">

<i class="fas fa-chevron-right"></i>

</button>





<button onclick="jumpToPage()">

<i class="fas fa-book-open"></i>

</button>





<button class="next-page"
onclick="Reader.next()">

<i class="fas fa-chevron-left"></i>

</button>


</div>


<!-- أدوات القراءة -->


<div class="reader-tools">


<button onclick="changeFont(2)">
+
</button>



<button onclick="changeFont(-2)">
-
</button>


</div>







<!-- مشغل الصوت -->


<div class="audio-player">


<select id="reciter-select">
</select>


<div class="custom-player">

    <div class="player-info">
        <span id="playing-reciter">مشاري راشد العفاسي</span>
        <span id="playing-status">جاهز للتشغيل</span>
    </div>


    <div class="player-buttons">

        <button onclick="QuranAudio.previousAyah()">
            <i class="fas fa-backward-step"></i>
        </button>


        <button id="playButton" onclick="QuranAudio.togglePlay()">
            <i class="fas fa-play"></i>
        </button>


        <button onclick="QuranAudio.nextAyah()">
            <i class="fas fa-forward-step"></i>
        </button>

    </div>


    <input 
    id="audio-progress"
    type="range"
    min="0"
    max="100"
    value="0">


</div>


<audio id="audio-player" preload="none"></audio>


</div>



<!-- العلامة المرجعية -->


<button id="bookmarkButton"
class="bookmark-button">

<i class="far fa-bookmark"></i>

</button>








<!-- ملفات المشروع -->


<script src="utils.js"></script>

<script src="chapters.js"></script>

<script src="reciters.js"></script>

<script src="api.js"></script>

<script src="audio.js"></script>

<script src="reader.js"></script>

<script src="app.js"></script>


</body>

</html>
